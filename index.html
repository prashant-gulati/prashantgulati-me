  <script>
    fetch('https://api.github.com/users/prashant-gulati/repos?sort=updated&per_page=100')
      .then(r => r.json())
      .then(repos => {
        const container = document.getElementById('gh-repos');
        const filtered = repos.filter(r => !r.fork && r.name !== 'prashantgulati-me');
        if (!filtered.length) { container.innerHTML = '<p class="error">Could not load repos.</p>'; return; }
        container.innerHTML = filtered.map(r => `
          <div class="repo">
            <div>
              <a href="${r.html_url}" target="_blank" rel="noopener">${r.name}</a>
              ${r.description ? `<div class="repo-desc">${r.description}</div>` : ''}
            </div>
            ${r.language ? `<span class="repo-lang">${r.language}</span>` : ''}
          </div>`).join('');
      })
      .catch(() => {
        document.getElementById('gh-repos').innerHTML = '<p class="error">Could not load repos.</p>';
      });

    fetch('/api/feed')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('feed');
        if (data.status !== 'ok' || !data.items || !data.items.length) {
          container.innerHTML = '<p class="error">Could not load posts.</p>';
          return;
        }
        container.innerHTML = data.items.slice(0, 5).map(item => {
          const date = new Date(item.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          const desc = item.description.replace(/<[^>]+>/g, '').slice(0, 160).trim() + '…';
          return `
            <div class="post">
              <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
              <div class="meta">${date}</div>
              <div class="desc">${desc}</div>
            </div>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('feed').innerHTML = '<p class="error">Could not load posts.</p>';
      });
  </script>
