<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prashantgulati.me</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 20px;
      color: #1a1a1a;
      background: #fff;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    h2 { font-size: 1.2rem; margin: 48px 0 20px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .post { margin-bottom: 32px; }
    .post a {
      font-size: 1.1rem;
      font-weight: bold;
      color: #1a1a1a;
      text-decoration: none;
    }
    .post a:hover { text-decoration: underline; }
    .post .meta { font-size: 0.8rem; color: #888; margin: 4px 0 8px; }
    .post .desc { font-size: 0.95rem; color: #444; line-height: 1.5; }
    .error { color: #c00; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Hello World</h1>

  <h2>Writing</h2>
  <div id="feed"><p style="color:#888;font-size:0.9rem;">Loading posts...</p></div>

  <script>
    const RSS_URL = 'https://prashantgulati.substack.com/feed';
    const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&count=10`;

    fetch(API)
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('feed');
        if (data.status !== 'ok' || !data.items.length) {
          container.innerHTML = '<p class="error">Could not load posts.</p>';
          return;
        }
        container.innerHTML = data.items.map(item => {
          const date = new Date(item.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          const desc = item.description.replace(/<[^>]+>/g, '').slice(0, 160).trim() + '…';
          return `
            <div class="post">
              <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
              <div class="meta">${date}</div>
              <div class="desc">${desc}</div>
            </div>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('feed').innerHTML = '<p class="error">Could not load posts.</p>';
      });
  </script>
</body>
</html>
